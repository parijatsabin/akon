<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>ANOK</title>
    <script>
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script needs to be in the 404.html file
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, -1).join('/') +
        '/?p=/' +
        l.pathname.slice(1).split('/').slice(l.pathname.split('/').slice(0, -1).length).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
